<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>减肥记录本</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #4CAF50;
  --primary-dark: #388E3C;
  --primary-light: #C8E6C9;
  --bg: #F5F6F8;
  --card: #FFFFFF;
  --text: #2D3436;
  --text-secondary: #888;
  --text-light: #B2BEC3;
  --danger: #E17055;
  --warning: #FDCB6E;
  --border: #E8ECF0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px;
  --tab-height: 60px;
  --header-height: 50px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: calc(var(--tab-height) + 20px);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  overscroll-behavior: none;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--primary);
  color: #fff;
  height: var(--header-height);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(76,175,80,0.2);
  gap: 8px;
}
.header .icon { font-size: 20px; }

/* Page Container */
.page { display: none; padding: 16px; animation: fadeIn 0.25s ease; }
.page.active { display: block; }

@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-item {
  background: var(--primary-light);
  border-radius: 12px;
  padding: 14px 12px;
  text-align: center;
}
.stat-value { font-size: 28px; font-weight: 700; color: var(--primary-dark); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.stat-unit { font-size: 13px; font-weight: 400; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); opacity: 0.8; }
.btn-primary { background: var(--primary); color: #fff; width: 100%; }
.btn-danger { background: #fff; color: var(--danger); border: 1.5px solid var(--danger); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 18px; }
.btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-small { padding: 8px 16px; font-size: 13px; border-radius: 20px; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--primary); background: #fff; }
.form-row { display: flex; gap: 10px; }
.form-row > * { flex: 1; }

/* Meal Cards */
.meal-section { margin-bottom: 14px; }
.meal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.meal-header .meal-name { font-size: 14px; font-weight: 600; }
.meal-header .meal-cal { font-size: 12px; color: var(--text-secondary); }
.meal-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
}
.badge-breakfast { background: #FFF3E0; color: #E65100; }
.badge-lunch { background: #E8F5E9; color: #2E7D32; }
.badge-dinner { background: #EDE7F6; color: #4527A0; }
.badge-snack { background: #FCE4EC; color: #C62828; }

.food-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}
.food-item .remove { color: var(--danger); cursor: pointer; font-size: 16px; padding: 0 4px; }
.food-empty { color: var(--text-light); font-size: 13px; text-align: center; padding: 10px 0; }

/* Quick Foods */
.quick-foods { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.quick-food {
  padding: 5px 12px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-food:active { background: var(--primary-light); border-color: var(--primary); }

/* Chart */
.chart-wrap { position: relative; height: 220px; }
.chart-wrap canvas { width: 100% !important; height: 100% !important; }

/* Log List */
.log-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.log-item:last-child { border-bottom: none; }
.log-date { font-size: 13px; font-weight: 600; }
.log-brief { font-size: 12px; color: var(--text-secondary); }

/* Dimension Grid */
.dim-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

/* Bottom Tab Bar */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 500px;
  height: var(--tab-height);
  background: #fff;
  display: flex;
  border-top: 1px solid var(--border);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-light);
  cursor: pointer;
  transition: color 0.2s;
  gap: 2px;
}
.tab-item.active { color: var(--primary); }
.tab-item .tab-icon { font-size: 22px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  justify-content: center;
  align-items: flex-end;
  animation: fadeIn 0.2s;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: #fff;
  width: 100%;
  max-width: 500px;
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 30px;
  max-height: 70vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 40px; height: 4px;
  background: #ddd; border-radius: 2px;
  margin: 0 auto 16px;
}

/* ============ 登录页 ============ */
.login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  max-width: 500px;
  margin: 0 auto;
}
.login-screen.hidden { display: none; }

.login-logo {
  font-size: 64px;
  margin-bottom: 12px;
}

.login-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.login-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.login-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 20px;
  width: 100%;
  box-shadow: var(--shadow);
}

.login-hint {
  font-size: 12px;
  color: var(--text-light);
  text-align: center;
  margin-top: 16px;
}

.user-list {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.user-chip:active {
  background: var(--primary-light);
}
.user-chip .user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
}
.user-chip .user-info {
  flex: 1;
}
.user-chip .user-name {
  font-size: 14px;
  font-weight: 600;
}
.user-chip .user-meta {
  font-size: 11px;
  color: var(--text-secondary);
}
.user-chip .user-delete {
  color: var(--danger);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 10px;
  border: 1px solid var(--danger);
  background: none;
  cursor: pointer;
}

/* User Badge in header */
.user-badge {
  position: absolute;
  right: 14px;
  font-size: 12px;
  opacity: 0.8;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Toast */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Food Search */
.food-search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.food-search-wrap .search-input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  background: var(--bg);
  outline: none;
}
.food-search-wrap .search-input:focus {
  border-color: var(--primary);
  background: #fff;
}
.food-search-wrap .search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--text-light);
}
.food-search-results {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  max-height: 280px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}
.food-search-results.show {
  display: block;
}
.food-result-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--bg);
  font-size: 13px;
  transition: background 0.15s;
}
.food-result-item:last-child {
  border-bottom: none;
}
.food-result-item:active, .food-result-item:hover {
  background: var(--primary-light);
}
.food-result-item .food-result-name {
  font-weight: 500;
}
.food-result-item .food-result-cal {
  color: var(--primary-dark);
  font-weight: 600;
  font-size: 13px;
}
.food-result-item .food-result-macro {
  color: var(--text-light);
  font-size: 10px;
  margin-top: 2px;
}
.food-result-cat {
  font-size: 10px;
  color: var(--text-light);
  padding: 6px 14px 2px;
  background: #fff;
  position: sticky;
  top: 0;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.food-search-no {
  padding: 16px;
  text-align: center;
  color: var(--text-light);
  font-size: 13px;
}

/* Date Nav */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.date-nav .nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.date-nav .nav-btn:active { background: var(--primary-light); }
.date-nav .date-text { font-size: 15px; font-weight: 600; }

/* Nutrition Bars */
.nutrition-row {
  margin-bottom: 10px;
}
.nutrition-row:last-child {
  margin-bottom: 0;
}
.nutrition-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 3px;
}
.nutrition-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.nutrition-num {
  font-size: 11px;
  color: var(--text-secondary);
}
.nutrition-bar-bg {
  height: 8px;
  background: #E8ECF0;
  border-radius: 4px;
  overflow: hidden;
}
.nutrition-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
  min-width: 4px;
}

/* Macro Tags */
.food-macro-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.food-macro-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--bg);
  color: var(--text-secondary);
}
.food-macro-tag.pro { color: #E17055; }
.food-macro-tag.carb { color: #F39C12; }
.food-macro-tag.fat { color: #0984E3; }
.food-macro-tag.fiber { color: #00B894; }

/* Section Divider */
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 14px 0 8px;
  padding-left: 4px;
}
</style>
</head>
<body>

<!-- ==================== 登录页 ==================== -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">🏃</div>
  <div class="login-title">减肥记录本</div>
  <div class="login-subtitle">每个人独立的减肥数据，互不串台</div>

  <div class="login-card" id="loginNew">
    <div class="card-title">👤 创建新账号</div>
    <div class="form-group">
      <label class="form-label">你的昵称</label>
      <input class="form-input" id="loginName" placeholder="输入昵称，如：银时" maxlength="12">
    </div>
    <button class="btn btn-primary" onclick="createUser()">✨ 开始记录</button>
  </div>

  <div class="user-list" id="existingUsers"></div>

  <div class="login-hint">💡 每个人的数据独立存储，不会混淆</div>
</div>

<!-- ==================== 主应用 ==================== -->
<div class="header">
  <span class="icon">🏃</span>减肥记录本
  <span class="user-badge" id="userBadge"></span>
</div>

<!-- 页面1: 首页 -->
<div class="page active" id="page-home">
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDate(-1)">◀</button>
    <span class="date-text" id="homeDate"></span>
    <button class="nav-btn" onclick="changeDate(1)">▶</button>
  </div>

  <div class="card">
    <div class="card-title">📊 今日概览</div>
    <div id="homeStats">
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <div>还没有今天的记录，快去记录吧</div>
      </div>
    </div>
    <div id="nutritionBars" style="margin-top:14px"></div>
  </div>

  <div class="card">
    <div class="card-title">📈 体重趋势（近30天）</div>
    <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title">📐 维度趋势（近30天）</div>
    <div class="chart-wrap"><canvas id="dimensionChart"></canvas></div>
  </div>
</div>

<!-- 页面2: 饮食 -->
<div class="page" id="page-meals">
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDateMeals(-1)">◀</button>
    <span class="date-text" id="mealsDate"></span>
    <button class="nav-btn" onclick="changeDateMeals(1)">▶</button>
  </div>

  <div class="card meal-section">
    <div class="meal-header">
      <span class="meal-name"><span class="meal-badge badge-breakfast">早餐</span></span>
      <span class="meal-cal" id="breakfastCal">0 kcal</span>
    </div>
    <div id="breakfastList"><div class="food-empty">还没记录早餐</div></div>
    <div class="quick-foods" id="quickBreakfast"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:6px" onclick="openFoodModal('breakfast')">+ 添加食物</button>
  </div>

  <div class="card meal-section">
    <div class="meal-header">
      <span class="meal-name"><span class="meal-badge badge-lunch">午餐</span></span>
      <span class="meal-cal" id="lunchCal">0 kcal</span>
    </div>
    <div id="lunchList"><div class="food-empty">还没记录午餐</div></div>
    <div class="quick-foods" id="quickLunch"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:6px" onclick="openFoodModal('lunch')">+ 添加食物</button>
  </div>

  <div class="card meal-section">
    <div class="meal-header">
      <span class="meal-name"><span class="meal-badge badge-dinner">晚餐</span></span>
      <span class="meal-cal" id="dinnerCal">0 kcal</span>
    </div>
    <div id="dinnerList"><div class="food-empty">还没记录晚餐</div></div>
    <div class="quick-foods" id="quickDinner"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:6px" onclick="openFoodModal('dinner')">+ 添加食物</button>
  </div>

  <div class="card meal-section">
    <div class="meal-header">
      <span class="meal-name"><span class="meal-badge badge-snack">加餐/零食</span></span>
      <span class="meal-cal" id="snackCal">0 kcal</span>
    </div>
    <div id="snackList"><div class="food-empty">还没记录加餐</div></div>
    <div class="quick-foods" id="quickSnack"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:6px" onclick="openFoodModal('snack')">+ 添加食物</button>
  </div>
</div>

<!-- 页面3: 身体数据 -->
<div class="page" id="page-body">
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDateBody(-1)">◀</button>
    <span class="date-text" id="bodyDate"></span>
    <button class="nav-btn" onclick="changeDateBody(1)">▶</button>
  </div>

  <div class="card">
    <div class="card-title">⚖️ 体重</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <input type="number" class="form-input" id="inputWeight" placeholder="输入体重" step="0.1" inputmode="decimal">
      </div>
      <div class="form-group" style="flex:1">
        <select class="form-input" id="weightUnit" style="padding:12px 8px">
          <option value="kg">kg</option>
          <option value="斤">斤</option>
        </select>
      </div>
    </div>
    <div id="savedWeight" style="font-size:13px;color:var(--text-secondary);margin-bottom:8px"></div>
  </div>

  <div class="card">
    <div class="card-title">📐 身体维度（cm）</div>
    <div class="dim-grid">
      <div class="form-group"><label class="form-label">腰围</label><input type="number" class="form-input" id="dimWaist" placeholder="cm" step="0.1" inputmode="decimal"></div>
      <div class="form-group"><label class="form-label">臀围</label><input type="number" class="form-input" id="dimHip" placeholder="cm" step="0.1" inputmode="decimal"></div>
      <div class="form-group"><label class="form-label">胸围</label><input type="number" class="form-input" id="dimChest" placeholder="cm" step="0.1" inputmode="decimal"></div>
      <div class="form-group"><label class="form-label">大腿</label><input type="number" class="form-input" id="dimThigh" placeholder="cm" step="0.1" inputmode="decimal"></div>
      <div class="form-group"><label class="form-label">小腿</label><input type="number" class="form-input" id="dimCalf" placeholder="cm" step="0.1" inputmode="decimal"></div>
      <div class="form-group"><label class="form-label">手臂</label><input type="number" class="form-input" id="dimArm" placeholder="cm" step="0.1" inputmode="decimal"></div>
    </div>
    <div id="savedDims" style="font-size:13px;color:var(--text-secondary);margin-top:8px"></div>
    <button class="btn btn-primary" style="margin-top:10px" onclick="saveBodyData()">💾 保存身体数据</button>
  </div>
</div>

<!-- 页面4: 我的 -->
<div class="page" id="page-mine">
  <div class="card">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ 用户系统 ============
const USERS_KEY = 'slimtrack_user_accounts';
let currentUser = null;
let appData = { records: {} };

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

function userId(name) {
  return 'u_' + name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_').toLowerCase();
}

function storageKey(uid) {
  return 'slimtrack_data_' + uid;
}

// 创建用户
function createUser() {
  const name = document.getElementById('loginName').value.trim();
  if (!name) { showToast('请输入昵称'); return; }
  if (name.length > 12) { showToast('昵称最多12个字'); return; }

  const uid = userId(name);
  const users = getUsers();
  if (users[uid]) { showToast('该昵称已存在，请换一个'); return; }

  users[uid] = { name: name, createdAt: new Date().toISOString() };
  saveUsers(users);

  // 初始化空数据
  localStorage.setItem(storageKey(uid), JSON.stringify({ records: {} }));

  loginAs(uid);
}

// 登录
function loginAs(uid) {
  const users = getUsers();
  const user = users[uid];
  if (!user) return;

  currentUser = { uid: uid, name: user.name };
  loadData();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('userBadge').textContent = '👤 ' + user.name;
  switchTab('home');
  showToast('欢迎回来，' + user.name + '！');
}

// 切换用户
function switchUser() {
  document.getElementById('loginScreen').classList.remove('hidden');
  renderUserList();
}

// 删除用户
function deleteUser(uid) {
  const users = getUsers();
  const name = users[uid].name;
  if (!confirm('确定删除「' + name + '」的所有数据吗？此操作不可恢复！')) return;

  delete users[uid];
  saveUsers(users);
  localStorage.removeItem(storageKey(uid));

  if (currentUser && currentUser.uid === uid) {
    currentUser = null;
    document.getElementById('userBadge').textContent = '';
  }

  renderUserList();
  showToast('已删除：' + name);
}

function renderUserList() {
  const users = getUsers();
  const el = document.getElementById('existingUsers');
  const uids = Object.keys(users);

  if (uids.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-light);font-size:13px;margin-top:20px">还没有账号，创建一个吧</div>';
    return;
  }

  el.innerHTML = '<div class="section-title" style="margin-top:20px">已有账号（点击登录）</div>' +
    uids.map(uid => {
      const u = users[uid];
      const data = loadUserData(uid);
      const dates = Object.keys(data.records || {});
      const lastDate = dates.length > 0 ? dates.sort().reverse()[0] : null;
      const meta = lastDate ? '最近记录：' + lastDate : '还没有记录';
      return `
      <div class="user-chip" onclick="loginAs('${uid}')">
        <div class="user-avatar">${u.name.charAt(0)}</div>
        <div class="user-info">
          <div class="user-name">${u.name}</div>
          <div class="user-meta">${meta}</div>
        </div>
        <button class="user-delete" onclick="event.stopPropagation();deleteUser('${uid}')">删除</button>
      </div>
    `;
    }).join('');
}

function loadUserData(uid) {
  try {
    const raw = localStorage.getItem(storageKey(uid));
    return raw ? JSON.parse(raw) : { records: {} };
  } catch(e) { return { records: {} }; }
}

// ============ 数据层 ============
function loadData() {
  if (!currentUser) return;
  appData = loadUserData(currentUser.uid);
}

function saveData() {
  if (!currentUser) return;
  localStorage.setItem(storageKey(currentUser.uid), JSON.stringify(appData));
}

function getRecord(date) {
  if (!appData.records[date]) {
    appData.records[date] = {
      meals: { breakfast: [], lunch: [], dinner: [], snack: [] },
      body: { weight: null, unit: 'kg', waist: null, hip: null, chest: null, thigh: null, calf: null, arm: null }
    };
  }
  return appData.records[date];
}

function today() { return new Date().toISOString().slice(0,10); }

function fmtDate(d) {
  const parts = d.split('-');
  const w = ['日','一','二','三','四','五','六'][new Date(d).getDay()];
  return parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日 周' + w;
}

// ============ 全局状态 ============
let currentHomeDate = today();
let currentMealsDate = today();
let currentBodyDate = today();
let currentFoodMeal = 'breakfast';

// ============ Toast ============
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 1800);
}

// ============ Tab 切换 ============
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector('[data-page="' + tab + '"]').classList.add('active');

  if (tab === 'home') { renderHome(); }
  if (tab === 'meals') { renderMeals(); }
  if (tab === 'body') { renderBody(); }
  if (tab === 'mine') { renderMine(); }
}

// ============ 日期导航 ============
function changeDate(delta) {
  var d = new Date(currentHomeDate);
  d.setDate(d.getDate() + delta);
  currentHomeDate = d.toISOString().slice(0,10);
  currentMealsDate = currentHomeDate;
  currentBodyDate = currentHomeDate;
  renderHome();
}

function changeDateMeals(delta) {
  var d = new Date(currentMealsDate);
  d.setDate(d.getDate() + delta);
  currentMealsDate = d.toISOString().slice(0,10);
  renderMeals();
}

function changeDateBody(delta) {
  var d = new Date(currentBodyDate);
  d.setDate(d.getDate() + delta);
  currentBodyDate = d.toISOString().slice(0,10);
  renderBody();
}

// ============ 首页 ============
var weightChartInst = null;
var dimChartInst = null;

// 每日营养目标（减肥参考，可自行调整）
var dailyTarget = { cal: 1800, protein: 75, carbs: 150, fat: 50, fiber: 25 };

function renderHome() {
  document.getElementById('homeDate').textContent = fmtDate(currentHomeDate);
  var rec = getRecord(currentHomeDate);

  var totalCal = 0;
  var totalProtein = 0, totalCarbs = 0, totalFat = 0, totalFiber = 0;
  var foodCount = 0;
  ['breakfast','lunch','dinner','snack'].forEach(function(m) {
    rec.meals[m].forEach(function(f) {
      totalCal += f.calories || 0;
      totalProtein += f.protein || 0;
      totalCarbs += f.carbs || 0;
      totalFat += f.fat || 0;
      totalFiber += f.fiber || 0;
      foodCount++;
    });
  });
  var weight = rec.body.weight;
  var weightDisplay = weight ? weight + ' ' + (rec.body.unit || 'kg') : '--';

  document.getElementById('homeStats').innerHTML =
    '<div class="stats-grid">' +
      '<div class="stat-item">' +
        '<div class="stat-value">' + totalCal + '<span class="stat-unit"> kcal</span></div>' +
        '<div class="stat-label">今日摄入热量</div>' +
      '</div>' +
      '<div class="stat-item">' +
        '<div class="stat-value">' + weightDisplay + '</div>' +
        '<div class="stat-label">今日体重</div>' +
      '</div>' +
      '<div class="stat-item">' +
        '<div class="stat-value">' + foodCount + '<span class="stat-unit"> 种</span></div>' +
        '<div class="stat-label">今日食物种类</div>' +
      '</div>' +
      '<div class="stat-item">' +
        '<div class="stat-value">' + (rec.body.waist || '--') + '<span class="stat-unit"> cm</span></div>' +
        '<div class="stat-label">今日腰围</div>' +
      '</div>' +
    '</div>';

  // 营养分析条
  var macros = [
    { label:'🥚 蛋白质', val:totalProtein, target:dailyTarget.protein, unit:'g', color:'#E17055' },
    { label:'🍚 碳水', val:totalCarbs, target:dailyTarget.carbs, unit:'g', color:'#FDCB6E' },
    { label:'🥩 脂肪', val:totalFat, target:dailyTarget.fat, unit:'g', color:'#0984E3' },
    { label:'🌿 膳食纤维', val:totalFiber, target:dailyTarget.fiber, unit:'g', color:'#00B894' },
  ];
  document.getElementById('nutritionBars').innerHTML = macros.map(function(m) {
    var pct = Math.min(100, Math.round(m.val / m.target * 100));
    var barColor = pct >= 95 ? '#4CAF50' : (pct >= 70 ? m.color : '#bdc3c7');
    var fillWidth = Math.max(4, pct);
    return '<div class="nutrition-row">' +
      '<div class="nutrition-info">' +
        '<span class="nutrition-label">' + m.label + '</span>' +
        '<span class="nutrition-num">' + m.val.toFixed(1) + ' / ' + m.target + m.unit + '</span>' +
      '</div>' +
      '<div class="nutrition-bar-bg">' +
        '<div class="nutrition-bar-fill" style="width:' + fillWidth + '%;background:' + barColor + '"></div>' +
      '</div>' +
    '</div>';
  }).join('');

  renderWeightChart();
  renderDimensionChart();
}

function renderWeightChart() {
  var ctx = document.getElementById('weightChart').getContext('2d');
  if (weightChartInst) weightChartInst.destroy();

  var dates = []; var weights = [];
  for (var i = 29; i >= 0; i--) {
    var d = new Date();
    d.setDate(d.getDate() - i);
    var ds = d.toISOString().slice(0,10);
    var r = appData.records[ds];
    if (r && r.body && r.body.weight) {
      dates.push(ds.slice(5));
      var w = r.body.weight;
      if (r.body.unit === '斤') w = (w / 2).toFixed(1);
      weights.push(parseFloat(w));
    }
  }

  weightChartInst = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets: [{ label: '体重(kg)', data: weights, borderColor: '#4CAF50', backgroundColor: 'rgba(76,175,80,0.08)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#4CAF50' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxTicksLimit: 8 } },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

function renderDimensionChart() {
  var ctx = document.getElementById('dimensionChart').getContext('2d');
  if (dimChartInst) dimChartInst.destroy();

  var dates = []; var waists = []; var hips = [];
  for (var i = 29; i >= 0; i--) {
    var d = new Date();
    d.setDate(d.getDate() - i);
    var ds = d.toISOString().slice(0,10);
    var r = appData.records[ds];
    if (r && r.body && (r.body.waist || r.body.hip)) {
      dates.push(ds.slice(5));
      waists.push(r.body.waist || null);
      hips.push(r.body.hip || null);
    }
  }

  dimChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [
        { label: '腰围', data: waists, borderColor: '#E17055', tension: 0.4, pointRadius: 2, fill: false },
        { label: '臀围', data: hips, borderColor: '#0984E3', tension: 0.4, pointRadius: 2, fill: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxTicksLimit: 8 } },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

// 构建分类索引（只在首次构建一次）
var foodSearchIndex = null;
function buildSearchIndex() {
  if (foodSearchIndex) return;
  foodSearchIndex = {};
  allFoods.forEach(function(f) {
    // 索引：名称 + 分类
    var keys = f.name + ' ' + f.cat;
    // 支持拼音首字母模糊匹配（简单处理：把常用食物名拆成单字）
    for (var i = 0; i < f.name.length; i++) {
      var ch = f.name.charAt(i);
      if (/[\u4e00-\u9fff]/.test(ch)) {
        if (!foodSearchIndex[ch]) foodSearchIndex[ch] = [];
        if (foodSearchIndex[ch].indexOf(f) === -1) foodSearchIndex[ch].push(f);
      }
    }
    // 全名索引
    if (!foodSearchIndex[f.name]) foodSearchIndex[f.name] = [f];
  });
}

function searchFood(query) {
  buildSearchIndex();
  var resultsEl = document.getElementById('foodSearchResults');

  if (!query || query.trim().length === 0) {
    resultsEl.classList.remove('show');
    return;
  }

  query = query.trim().toLowerCase();

  // 搜索策略：先精确匹配，再模糊匹配
  var results = [];
  var seen = {};

  // 1. 名称包含
  allFoods.forEach(function(f) {
    if (f.name.toLowerCase().indexOf(query) !== -1 && !seen[f.name]) {
      results.push(f);
      seen[f.name] = true;
    }
  });

  // 2. 分类包含
  allFoods.forEach(function(f) {
    if (f.cat.toLowerCase().indexOf(query) !== -1 && !seen[f.name]) {
      results.push(f);
      seen[f.name] = true;
    }
  });

  // 3. 单字匹配（如果上面没结果）
  if (results.length === 0 && query.length <= 3) {
    allFoods.forEach(function(f) {
      if (f.name.indexOf(query) !== -1 && !seen[f.name]) {
        results.push(f);
        seen[f.name] = true;
      }
    });
  }

  if (results.length === 0) {
    resultsEl.innerHTML = '<div class="food-search-no">😕 没找到，手动输入名称和热量吧</div>';
  } else {
    // 按分类分组
    var cats = [];
    var catMap = {};
    results.forEach(function(f) {
      if (!catMap[f.cat]) { catMap[f.cat] = []; cats.push(f.cat); }
      catMap[f.cat].push(f);
    });

    var html = '';
    cats.forEach(function(cat) {
      html += '<div class="food-result-cat">' + cat + '</div>';
      catMap[cat].slice(0, 8).forEach(function(f) {
        html += '<div class="food-result-item" onclick="selectFood(\'' +
          f.name.replace(/'/g, "\\'") + '\',' + f.cal + ',\'' +
          f.amount.replace(/'/g, "\\'") + '\',' + (f.p||0) + ',' + (f.c||0) + ',' + (f.f||0) + ',' + (f.d||0) + ')">' +
          '<span class="food-result-name">' + f.name + '</span>' +
          '<span class="food-result-cal">' + f.cal + ' kcal</span>' +
          '<span class="food-result-macro">🥚' + (f.p||0) + ' 🍚' + (f.c||0) + ' 🥩' + (f.f||0) + '</span>' +
        '</div>';
      });
    });
    resultsEl.innerHTML = html;
  }
  resultsEl.classList.add('show');
}

function renderMeals() {
  document.getElementById('mealsDate').textContent = fmtDate(currentMealsDate);
  var rec = getRecord(currentMealsDate);

  ['breakfast','lunch','dinner','snack'].forEach(function(meal) {
    var list = rec.meals[meal];
    var el = document.getElementById(meal + 'List');
    var calEl = document.getElementById(meal + 'Cal');
    var totalCal = list.reduce(function(s, f) { return s + (f.calories || 0); }, 0);
    calEl.textContent = totalCal + ' kcal';

    if (list.length === 0) {
      el.innerHTML = '<div class="food-empty">还没记录</div>';
    } else {
      el.innerHTML = list.map(function(f, i) {
        var macros = [];
        if (f.protein) macros.push('<span class="food-macro-tag pro">🥚' + f.protein + 'g</span>');
        if (f.carbs) macros.push('<span class="food-macro-tag carb">🍚' + f.carbs + 'g</span>');
        if (f.fat) macros.push('<span class="food-macro-tag fat">🥩' + f.fat + 'g</span>');
        if (f.fiber) macros.push('<span class="food-macro-tag fiber">🌿' + f.fiber + 'g</span>');
        return '<div class="food-item">' +
          '<div>' +
            '<span>🍴 ' + f.name + (f.amount ? '(' + f.amount + ')' : '') + '</span>' +
            (macros.length ? '<div class="food-macro-tags">' + macros.join('') + '</div>' : '') +
          '</div>' +
          '<span style="display:flex;align-items:center;gap:8px">' +
            '<span style="color:var(--text-secondary);white-space:nowrap">' + f.calories + ' kcal</span>' +
            '<span class="remove" onclick="removeFood(\'' + meal + '\', ' + i + ')">×</span>' +
          '</span>' +
        '</div>';
      }).join('');
    }

    var quickEl = document.getElementById('quick' + meal.charAt(0).toUpperCase() + meal.slice(1));
    quickEl.innerHTML = (commonFoods[meal] || []).map(function(f) {
      return '<span class="quick-food" onclick="quickAddFood(\'' + meal + '\',\'' + f.name + '\',' + f.cal + ',\'' + f.amount + '\',0,0,0,0)">' + f.name + ' ' + f.cal + 'kcal</span>';
    }).join('');
  });
}

  var totalDays = dates.length;
  var totalRecords = 0;
  dates.forEach(function(d) {
    var r = appData.records[d];
    ['breakfast','lunch','dinner','snack'].forEach(function(m) {
      totalRecords += r.meals[m].length;
    });
  });
  document.getElementById('myStats').textContent = totalDays + '天记录 · ' + totalRecords + '次饮食';

  // 历史
  var sortedDates = Object.keys(appData.records).sort().reverse().slice(0, 60);
  var el = document.getElementById('historyList');

  if (sortedDates.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>还没有任何记录</div></div>';
    return;
  }

  el.innerHTML = sortedDates.map(function(d) {
    var r = appData.records[d];
    var cal = 0; var items = 0;
    ['breakfast','lunch','dinner','snack'].forEach(function(m) {
      r.meals[m].forEach(function(f) { cal += f.calories||0; items++; });
    });
    var w = r.body.weight ? r.body.weight + ' ' + (r.body.unit||'kg') : '--';
    return '<div class="log-item" onclick="jumpToDate(\'' + d + '\')">' +
      '<div>' +
        '<div class="log-date">' + fmtDate(d) + '</div>' +
        '<div class="log-brief">🍽 ' + items + '种食物 · ' + cal + 'kcal | ⚖ ' + w + '</div>' +
      '</div>' +
      '<span style="color:var(--primary);font-size:13px">查看 ›</span>' +
    '</div>';
  }).join('');
}

function jumpToDate(d) {
  currentHomeDate = d; currentMealsDate = d; currentBodyDate = d;
  switchTab('home');
}

// ============ 数据导入导出 ============
function exportData() {
  var blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '减肥记录_' + (currentUser ? currentUser.name : '') + '_备份_' + today() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 数据已导出');
}

function importData(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.records) throw new Error('格式错误');
      appData = data;
      saveData();
      showToast('📥 数据已导入');
      switchTab('home');
    } catch(err) {
      showToast('❌ 文件格式不正确');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function confirmClearAll() {
  if (confirm('⚠️ 确定要清除「' + currentUser.name + '」的所有减肥记录吗？此操作不可恢复！')) {
    appData = { records: {} };
    saveData();
    switchTab('home');
    showToast('🗑️ 所有数据已清除');
  }
}

// ============ 初始化 ============
(function init() {
  var users = getUsers();
  var uids = Object.keys(users);

  // 如果只有1个用户，自动登录
  if (uids.length === 1) {
    loginAs(uids[0]);
  }
  // 否则显示登录页
  renderUserList();
})();

// ============ 快捷键 ============
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeFoodModal();
    document.getElementById('loginScreen').classList.remove('hidden');
    renderUserList();
  }
});
